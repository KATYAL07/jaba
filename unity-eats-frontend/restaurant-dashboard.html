<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity Eats | Restaurant Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="restaurant">
    <div id="loading-overlay" class="loading-overlay"><div class="loader-spinner"></div></div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo"><span class="logo-icon">🍃</span><span class="logo-text">Unity Eats</span></div>
            <div class="nav-right">
                <div class="nav-user-info">
                    <div class="user-avatar" id="nav-avatar">R</div>
                    <div class="user-details">
                        <span class="user-name" id="nav-user-name">User</span>
                        <span class="user-role-badge" id="nav-user-role">RESTAURANT</span>
                    </div>
                </div>
                <button class="btn-logout" id="logout-btn"><span>⏻</span> Logout</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <section class="dashboard-section">
            <div class="dashboard-container">
                <div class="dashboard-header">
                    <div>
                        <h2 class="dashboard-title">Restaurant Dashboard</h2>
                        <p class="dashboard-subtitle">Post surplus food & track your listings</p>
                    </div>
                    <div class="dashboard-actions">
                        <button class="btn-primary" id="open-post-form-btn">+ Post Food</button>
                    </div>
                </div>

                <div class="card form-card" id="post-food-card" style="display:none;">
                    <div class="card-header">
                        <h3>📤 Post Surplus Food</h3>
                        <button class="btn-icon" id="close-post-form">✕</button>
                    </div>
                    <form id="post-food-form" class="food-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Food Name *</label>
                                <input type="text" id="food-name" required pattern="^[A-Za-z ]{2,100}$">
                            </div>
                            <div class="form-group">
                                <label>Category *</label>
                                <input type="text" id="food-category" required pattern="^[A-Za-z ]{2,50}$">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Quantity *</label>
                                <input type="number" id="food-quantity" required min="1" max="10000">
                            </div>
                            <div class="form-group">
                                <label>Unit *</label>
                                <input type="text" id="food-unit" required pattern="^[A-Za-z]{2,20}$">
                            </div>
                            <div class="form-group">
                                <label>Expires In (hours) *</label>
                                <input type="number" id="food-expiry" required min="1" max="72">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Pickup Address *</label>
                            <input type="text" id="food-address" required pattern="^[A-Za-z0-9 ,.\-]{5,200}$">
                        </div>
                        <div class="form-group">
                            <label>Description (optional)</label>
                            <textarea id="food-description" maxlength="500"></textarea>
                        </div>
                        <div class="form-error-banner hidden" id="post-food-error"></div>
                        <div class="form-actions">
                            <button type="submit" class="btn-primary" id="post-food-submit">Post Listing</button>
                        </div>
                    </form>
                </div>

                <div class="listings-section">
                    <h3 class="section-heading">📋 My Food Listings</h3>
                    <div class="listings-grid" id="restaurant-listings">
                        <div class="loading-cards"><div class="skeleton-card"></div><div class="skeleton-card"></div></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast-container" class="toast-container"></div>
    <script src="app.js"></script>
</body>
</html>
