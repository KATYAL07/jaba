# ============================================================
# Unity Eats - Application Configuration
# ============================================================

# Server Port
server.port=8080

# ============================================================
# H2 In-Memory Database Configuration
# ============================================================
spring.datasource.url=jdbc:h2:mem:unityeatsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console - accessible at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
# create-drop: Creates schema on startup, drops on shutdown (perfect for in-memory dev)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT Configuration
# ============================================================
# Secret key must be at least 256 bits (32 bytes) for HS256.
# In production, this MUST come from environment variables / Vault, never hardcoded.
app.jwt.secret=UnityEats-Super-Secret-Key-For-JWT-Signing-2024-XYZ-ABCDEFGHIJKLMNOP
# Token expiration: 24 hours in milliseconds
app.jwt.expiration-ms=86400000

# ============================================================
# CORS Configuration
# ============================================================
# Allow the vanilla frontend (served via Live Server or similar) to communicate
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://localhost:8081

# ============================================================
# Logging
# ============================================================
logging.level.com.unityeats=DEBUG
logging.level.org.springframework.security=WARN
